<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>领取红包</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --red-deep: #8B0000;
    --red-bright: #E53935;
    --red-glow: #FF1744;
    --gold: #FFD700;
    --gold-dark: #B8860B;
    --black-bg: #0a0a0a;
    --black-card: #1a1a1a;
    --text-light: #f0e6e6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--black-bg);
    color: var(--text-light);
    overflow: hidden;
    height: 100vh;
    height: 100dvh;
    width: 100%;
  }

  /* ===== 背景粒子 ===== */
  .bg-particles {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .particle {
    position: absolute;
    width: 3px;
    height: 3px;
    background: var(--red-glow);
    border-radius: 50%;
    opacity: 0;
    animation: floatUp 4s ease-in infinite;
  }

  @keyframes floatUp {
    0% { opacity: 0; transform: translateY(0) scale(1); }
    20% { opacity: 0.8; }
    100% { opacity: 0; transform: translateY(-100vh) scale(0.3); }
  }

  /* ===== 场景通用 ===== */
  .scene {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: opacity 0.5s ease, transform 0.5s ease;
    padding: 20px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .scene.hidden {
    opacity: 0;
    pointer-events: none;
    transform: scale(0.95);
  }

  /* ===== 场景1：红包 ===== */
  #scene-envelope {
    gap: 36px;
  }

  .envelope-title {
    font-size: clamp(22px, 5vw, 32px);
    font-weight: 900;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
    letter-spacing: 4px;
    animation: titlePulse 2s ease-in-out infinite;
  }

  @keyframes titlePulse {
    0%, 100% { text-shadow: 0 0 30px rgba(255, 215, 0, 0.4); }
    50% { text-shadow: 0 0 60px rgba(255, 215, 0, 0.7), 0 0 100px rgba(255, 215, 0, 0.3); }
  }

  .envelope-container {
    position: relative;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .red-envelope {
    width: clamp(180px, 45vw, 260px);
    height: clamp(240px, 55vw, 340px);
    background: linear-gradient(160deg, #FF1744 0%, #D50000 40%, #B71C1C 100%);
    border-radius: 20px;
    position: relative;
    box-shadow:
      0 0 40px rgba(255, 23, 68, 0.5),
      0 0 80px rgba(255, 23, 68, 0.2),
      inset 0 -4px 12px rgba(0,0,0,0.3),
      inset 0 4px 12px rgba(255,255,255,0.1);
    animation: envelopeBounce 1.5s ease-in-out infinite;
    overflow: hidden;
  }

  @keyframes envelopeBounce {
    0%, 100% { transform: translateY(0) scale(1); }
    30% { transform: translateY(-10px) scale(1.02); }
    50% { transform: translateY(-14px) scale(1.03); }
    70% { transform: translateY(-8px) scale(1.02); }
  }

  /* 红包金色圆封 */
  .envelope-seal {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 72px;
    height: 72px;
    background: radial-gradient(circle, #FFD700 0%, #B8860B 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 20px rgba(255, 215, 0, 0.6), 0 4px 12px rgba(0,0,0,0.4);
    z-index: 2;
  }

  .envelope-seal::after {
    content: '发';
    font-size: 32px;
    font-weight: 900;
    color: #B71C1C;
    text-shadow: 0 1px 2px rgba(0,0,0,0.2);
  }

  /* 红包装饰线 */
  .envelope-line {
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    transform: translateY(-1px);
    opacity: 0.6;
  }

  .envelope-line.top { top: 35%; }
  .envelope-line.bottom { top: 65%; }

  /* 红包光晕 */
  .envelope-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(255, 23, 68, 0.3) 0%, transparent 70%);
    animation: glowPulse 2s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes glowPulse {
    0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
  }

  .envelope-hint {
    font-size: 16px;
    color: rgba(255, 215, 0, 0.8);
    animation: hintBlink 1.5s ease-in-out infinite;
    letter-spacing: 2px;
  }

  @keyframes hintBlink {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* 金币飘落 */
  .coin {
    position: absolute;
    font-size: 20px;
    animation: coinFall 3s ease-in infinite;
    opacity: 0;
    pointer-events: none;
  }

  @keyframes coinFall {
    0% { opacity: 0; transform: translateY(-20px) rotate(0deg); }
    20% { opacity: 1; }
    100% { opacity: 0; transform: translateY(80px) rotate(360deg); }
  }

  /* ===== 场景2：输入表单 ===== */
  #scene-form {
    gap: 0;
  }

  .form-card {
    background: linear-gradient(145deg, #1c1c1c, #111);
    border: 1px solid rgba(229, 57, 53, 0.3);
    border-radius: 16px;
    padding: clamp(24px, 5vw, 40px);
    width: min(420px, 90vw);
    box-shadow: 0 0 60px rgba(229, 57, 53, 0.1), 0 20px 60px rgba(0,0,0,0.5);
  }

  .form-header {
    text-align: center;
    margin-bottom: 28px;
  }

  .form-header .icon-circle {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--red-bright), var(--red-deep));
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 14px;
    box-shadow: 0 4px 20px rgba(229, 57, 53, 0.4);
  }

  .form-header .icon-circle i {
    font-size: 24px;
    color: #fff;
  }

  .form-header h2 {
    font-size: 20px;
    font-weight: 700;
    color: #f5f5f5;
    margin-bottom: 6px;
  }

  .form-header p {
    font-size: 13px;
    color: #888;
  }

  .form-group {
    margin-bottom: 18px;
  }

  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 700;
    color: #ccc;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  .input-wrapper {
    position: relative;
  }

  .input-wrapper i {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: #666;
    font-size: 16px;
    transition: color 0.3s;
  }

  .form-input {
    width: 100%;
    padding: 14px 14px 14px 44px;
    background: #0d0d0d;
    border: 1px solid #333;
    border-radius: 10px;
    color: #f0f0f0;
    font-size: 15px;
    font-family: 'Noto Sans SC', sans-serif;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .form-input::placeholder {
    color: #555;
  }

  .form-input:focus {
    border-color: var(--red-bright);
    box-shadow: 0 0 0 3px rgba(229, 57, 53, 0.15);
  }

  .form-input:focus + i,
  .form-input:focus ~ i {
    color: var(--red-bright);
  }

  .input-wrapper:focus-within i {
    color: var(--red-bright);
  }

  .amount-display {
    text-align: center;
    padding: 16px;
    background: linear-gradient(135deg, rgba(229, 57, 53, 0.1), rgba(139, 0, 0, 0.1));
    border: 1px solid rgba(229, 57, 53, 0.2);
    border-radius: 12px;
    margin-bottom: 22px;
  }

  .amount-display .label {
    font-size: 12px;
    color: #999;
    margin-bottom: 4px;
  }

  .amount-display .amount {
    font-size: 36px;
    font-weight: 900;
    color: var(--red-bright);
  }

  .amount-display .amount span {
    font-size: 18px;
    font-weight: 400;
  }

  .btn-confirm {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--red-bright), var(--red-deep));
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Noto Sans SC', sans-serif;
    cursor: pointer;
    letter-spacing: 3px;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(229, 57, 53, 0.4);
    position: relative;
    overflow: hidden;
  }

  .btn-confirm:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 30px rgba(229, 57, 53, 0.6);
  }

  .btn-confirm:active {
    transform: translateY(0);
  }

  .btn-confirm::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -60%;
    width: 40%;
    height: 200%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    transform: skewX(-20deg);
    animation: btnShine 3s ease-in-out infinite;
  }

  @keyframes btnShine {
    0%, 100% { left: -60%; }
    50% { left: 120%; }
  }

  /* ===== 场景3：加载中 ===== */
  #scene-loading {
    gap: 24px;
  }

  .loading-spinner {
    width: 64px;
    height: 64px;
    border: 4px solid #2a2a2a;
    border-top-color: var(--red-bright);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-text {
    font-size: 16px;
    color: #aaa;
    letter-spacing: 2px;
  }

  .loading-progress {
    width: min(300px, 70vw);
    height: 4px;
    background: #2a2a2a;
    border-radius: 2px;
    overflow: hidden;
  }

  .loading-progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--red-deep), var(--red-glow));
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s ease;
  }

  /* ===== 场景4：结果 ===== */
  #scene-result {
    gap: 20px;
  }

  .result-card {
    background: linear-gradient(145deg, #1a0a0a, #110505);
    border: 2px solid rgba(255, 23, 68, 0.5);
    border-radius: 20px;
    padding: clamp(28px, 6vw, 48px);
    width: min(440px, 90vw);
    text-align: center;
    box-shadow:
      0 0 80px rgba(255, 23, 68, 0.2),
      0 0 160px rgba(255, 23, 68, 0.05),
      0 20px 60px rgba(0,0,0,0.5);
    animation: resultAppear 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes resultAppear {
    0% { opacity: 0; transform: scale(0.7) translateY(30px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  .warning-icon {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #FF1744, #B71C1C);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    box-shadow: 0 0 40px rgba(255, 23, 68, 0.5);
    animation: warningPulse 1s ease-in-out infinite;
  }

  @keyframes warningPulse {
    0%, 100% { box-shadow: 0 0 40px rgba(255, 23, 68, 0.5); transform: scale(1); }
    50% { box-shadow: 0 0 80px rgba(255, 23, 68, 0.8); transform: scale(1.05); }
  }

  .warning-icon i {
    font-size: 36px;
    color: #fff;
  }

  .result-title {
    font-size: clamp(22px, 5vw, 30px);
    font-weight: 900;
    color: var(--red-glow);
    margin-bottom: 12px;
    letter-spacing: 3px;
  }

  .result-amount {
    font-size: clamp(40px, 10vw, 64px);
    font-weight: 900;
    color: #fff;
    margin: 16px 0;
    text-shadow: 0 0 30px rgba(255, 23, 68, 0.5);
    animation: amountShake 0.5s ease-in-out;
  }

  @keyframes amountShake {
    0%, 100% { transform: translateX(0); }
    10% { transform: translateX(-8px); }
    20% { transform: translateX(8px); }
    30% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    50% { transform: translateX(-4px); }
    60% { transform: translateX(4px); }
    70% { transform: translateX(-2px); }
    80% { transform: translateX(2px); }
  }

  .result-amount .unit {
    font-size: 0.4em;
    font-weight: 400;
    color: #ccc;
    vertical-align: middle;
  }

  .result-desc {
    font-size: 14px;
    color: #999;
    line-height: 1.8;
    margin-bottom: 24px;
  }

  .result-detail {
    background: rgba(255, 23, 68, 0.08);
    border: 1px solid rgba(255, 23, 68, 0.15);
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 24px;
    text-align: left;
  }

  .result-detail .row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 13px;
  }

  .result-detail .row .lbl { color: #888; }
  .result-detail .row .val { color: #ddd; font-weight: 700; }
  .result-detail .row .val.danger { color: var(--red-glow); }

  .result-warning-box {
    background: rgba(255, 215, 0, 0.08);
    border: 1px solid rgba(255, 215, 0, 0.2);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 20px;
  }

  .result-warning-box p {
    font-size: 14px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1.8;
  }

  .btn-restart {
    padding: 12px 36px;
    background: transparent;
    border: 2px solid #555;
    border-radius: 10px;
    color: #999;
    font-size: 14px;
    font-family: 'Noto Sans SC', sans-serif;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 2px;
  }

  .btn-restart:hover {
    border-color: #888;
    color: #ccc;
  }

  /* ===== 桌面端增强响应式 ===== */
  @media (min-width: 1200px) {
    .scene {
      padding: 32px;
    }

    #scene-envelope {
      gap: 36px;
    }

    .envelope-title {
      font-size: clamp(30px, 2.8vw, 44px);
      letter-spacing: 5px;
    }

    .red-envelope {
      width: clamp(240px, 22vw, 340px);
      height: clamp(320px, 30vw, 430px);
    }

    .envelope-glow {
      width: 420px;
      height: 420px;
    }

    .form-card {
      width: min(560px, 72vw);
      padding: 36px 42px;
    }

    .result-card {
      width: min(760px, 78vw);
      padding: 38px 44px;
    }

    .result-title {
      font-size: clamp(30px, 3vw, 44px);
    }

    .result-amount {
      font-size: clamp(52px, 6vw, 88px);
    }

    .result-desc {
      font-size: 18px;
      margin-bottom: 28px;
    }

    .result-detail .row {
      font-size: 15px;
    }

    .result-warning-box p {
      font-size: 16px;
    }
  }

  @media (max-height: 860px) and (min-width: 769px) {
    .scene {
      padding-top: 22px;
      padding-bottom: 22px;
    }

    #scene-envelope {
      gap: 16px;
    }

    #scene-form,
    #scene-result {
      justify-content: flex-start;
    }

    .red-envelope {
      width: clamp(180px, 16vw, 250px);
      height: clamp(240px, 22vw, 330px);
    }

    .form-card {
      padding: 22px 24px;
    }

    .result-card {
      padding: 24px 28px;
    }

    .warning-icon {
      width: 64px;
      height: 64px;
      margin-bottom: 12px;
    }

    .warning-icon i {
      font-size: 28px;
    }

    .result-desc {
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .result-detail,
    .result-warning-box {
      margin-bottom: 16px;
    }
  }

  /* ===== 顶部红色光线 ===== */
  .top-glow {
    position: fixed;
    top: -2px;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--red-glow), transparent);
    z-index: 100;
    animation: topGlowPulse 3s ease-in-out infinite;
  }

  @keyframes topGlowPulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* ===== 背景纹理 ===== */
  .bg-pattern {
    position: fixed;
    inset: 0;
    z-index: 1;
    opacity: 0.03;
    background-image:
      radial-gradient(circle at 25% 25%, var(--red-bright) 1px, transparent 1px),
      radial-gradient(circle at 75% 75%, var(--red-bright) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  .bg-vignette {
    position: fixed;
    inset: 0;
    z-index: 2;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
  }

  /* ===== toast ===== */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: #222;
    border: 1px solid #444;
    color: #eee;
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 14px;
    z-index: 9999;
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: none;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  /* ===== 屏幕闪烁效果 ===== */
  .screen-flash {
    position: fixed;
    inset: 0;
    background: var(--red-glow);
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.1s;
  }

  .screen-flash.active {
    opacity: 0.3;
  }

  /* ===== 响应式（平板/手机） ===== */
  @media (max-width: 1024px) {
    .scene {
      padding: 24px;
    }

    #scene-envelope {
      gap: 24px;
    }

    .form-card,
    .result-card {
      width: min(520px, 92vw);
    }

    .loading-progress {
      width: min(360px, 78vw);
    }
  }

  @media (max-width: 768px) {
    .scene {
      justify-content: center;
      padding:
        calc(14px + env(safe-area-inset-top))
        14px
        calc(18px + env(safe-area-inset-bottom));
    }

    #scene-form,
    #scene-result {
      justify-content: flex-start;
    }

    #scene-envelope {
      padding-top: calc(10px + env(safe-area-inset-top));
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
      gap: 18px;
    }

    .envelope-title {
      font-size: clamp(20px, 7vw, 28px);
      letter-spacing: 2px;
      text-align: center;
      line-height: 1.35;
    }

    .envelope-hint {
      font-size: 14px;
      letter-spacing: 1px;
    }

    .envelope-glow {
      width: 240px;
      height: 240px;
    }

    .form-card {
      width: 100%;
      padding: 20px 16px;
      border-radius: 14px;
    }

    .form-header {
      margin-bottom: 20px;
    }

    .form-header h2 {
      font-size: 18px;
    }

    .amount-display {
      padding: 14px;
      margin-bottom: 18px;
    }

    .amount-display .amount {
      font-size: 30px;
    }

    .form-input {
      font-size: 16px;
      padding: 13px 12px 13px 42px;
    }

    .btn-confirm {
      padding: 14px;
      font-size: 15px;
      letter-spacing: 2px;
    }

    #scene-loading {
      justify-content: center;
      gap: 18px;
    }

    .loading-text {
      font-size: 14px;
      letter-spacing: 1px;
      text-align: center;
    }

    .loading-progress {
      width: min(320px, 88vw);
    }

    .result-card {
      width: 100%;
      padding: 22px 16px;
      border-radius: 16px;
    }

    .warning-icon {
      width: 64px;
      height: 64px;
      margin-bottom: 14px;
    }

    .warning-icon i {
      font-size: 28px;
    }

    .result-title {
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .result-amount {
      margin: 12px 0;
    }

    .result-desc {
      font-size: 13px;
      line-height: 1.65;
      margin-bottom: 18px;
    }

    .result-detail {
      padding: 12px 14px;
      margin-bottom: 18px;
    }

    .result-detail .row {
      gap: 10px;
      font-size: 12px;
    }

    .result-warning-box {
      padding: 12px;
      margin-bottom: 16px;
    }

    .result-warning-box p {
      font-size: 12px;
      line-height: 1.6;
    }

    .btn-restart {
      width: 100%;
      padding: 12px 20px;
    }

    .toast {
      top: calc(12px + env(safe-area-inset-top));
      width: calc(100vw - 28px);
      max-width: 420px;
      padding: 10px 14px;
      font-size: 13px;
    }
  }

  @media (max-width: 420px) {
    .scene {
      padding-left: 12px;
      padding-right: 12px;
    }

    .red-envelope {
      width: min(72vw, 230px);
      height: min(96vw, 300px);
    }

    .envelope-seal {
      width: 64px;
      height: 64px;
    }

    .envelope-seal::after {
      font-size: 28px;
    }

    .form-header .icon-circle {
      width: 50px;
      height: 50px;
    }

    .form-header .icon-circle i {
      font-size: 20px;
    }

    .amount-display .amount {
      font-size: 28px;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

<!-- 背景层 -->
<div class="bg-pattern"></div>
<div class="bg-vignette"></div>
<div class="top-glow"></div>
<div class="bg-particles" id="particles"></div>
<div class="screen-flash" id="screenFlash"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 场景1：红包 -->
<section class="scene" id="scene-envelope" aria-label="红包领取">
  <div class="envelope-title">恭喜获得现金红包</div>
  <div class="envelope-container" id="envelopeClick" role="button" tabindex="0" aria-label="点击打开红包">
    <div class="envelope-glow"></div>
    <div class="red-envelope">
      <div class="envelope-line top"></div>
      <div class="envelope-seal"></div>
      <div class="envelope-line bottom"></div>
    </div>
  </div>
  <div class="envelope-hint">点击红包领取</div>
</section>

<!-- 场景2：输入表单 -->
<section class="scene hidden" id="scene-form" aria-label="身份验证">
  <div class="form-card">
    <div class="form-header">
      <div class="icon-circle"><i class="fas fa-shield-alt"></i></div>
      <h2>身份验证</h2>
      <p>验证身份后即可领取红包</p>
    </div>

    <div class="amount-display">
      <div class="label">红包金额</div>
      <div class="amount"><span>&yen;</span> 288.88</div>
    </div>

    <div class="form-group">
      <label>手机号码</label>
      <div class="input-wrapper">
        <i class="fas fa-mobile-alt"></i>
        <input class="form-input" type="tel" id="phoneInput" placeholder="请输入手机号码" maxlength="11" autocomplete="off">
      </div>
    </div>

    <div class="form-group">
      <label>支付密码</label>
      <div class="input-wrapper">
        <i class="fas fa-lock"></i>
        <input class="form-input" type="password" id="pwdInput" placeholder="请输入支付密码" maxlength="20" autocomplete="off">
      </div>
    </div>

    <button class="btn-confirm" id="btnConfirm">确认领取</button>
  </div>
</section>

<!-- 场景3：加载中 -->
<section class="scene hidden" id="scene-loading" aria-label="处理中">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loadingText">正在验证身份...</div>
  <div class="loading-progress">
    <div class="loading-progress-bar" id="progressBar"></div>
  </div>
</section>

<!-- 场景4：结果 -->
<section class="scene hidden" id="scene-result" aria-label="转账结果">
  <div class="result-card">
    <div class="warning-icon"><i class="fas fa-exclamation"></i></div>
    <div class="result-title">资金已被转走</div>
    <div class="result-amount" id="stolenAmount"><span class="unit">&yen;</span>15,680.00</div>
    <div class="result-desc">
      您输入的手机号和支付密码已被诈骗者获取<br>
      银行卡中的资金被瞬间转走
    </div>
    <div class="result-detail">
      <div class="row"><span class="lbl">转账方</span><span class="val danger">未知账户</span></div>
      <div class="row"><span class="lbl">转账时间</span><span class="val" id="transferTime">--</span></div>
      <div class="row"><span class="lbl">转账金额</span><span class="val danger" id="transferAmount">--</span></div>
      <div class="row"><span class="lbl">账户余额</span><span class="val danger">&yen; 0.12</span></div>
    </div>
    <div class="result-warning-box">
      <p><i class="fas fa-exclamation-triangle" style="margin-right:6px;"></i>这是一个模拟演示 — 扫描不明来源的二维码、在陌生页面输入支付密码，可能导致资金被盗。请时刻保持警惕！</p>
    </div>
    <button class="btn-restart" id="btnRestart">重新体验</button>
  </div>
</section>

<script>
  // ===== 背景粒子 =====
  (function initParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.top = (80 + Math.random() * 30) + '%';
      p.style.animationDelay = Math.random() * 4 + 's';
      p.style.animationDuration = (3 + Math.random() * 3) + 's';
      p.style.width = (2 + Math.random() * 3) + 'px';
      p.style.height = p.style.width;
      container.appendChild(p);
    }
  })();

  // ===== 场景切换 =====
  const scenes = {
    envelope: document.getElementById('scene-envelope'),
    form: document.getElementById('scene-form'),
    loading: document.getElementById('scene-loading'),
    result: document.getElementById('scene-result')
  };

  function switchScene(from, to) {
    from.classList.add('hidden');
    setTimeout(() => {
      to.classList.remove('hidden');
    }, 300);
  }

  // ===== Toast =====
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // ===== 屏幕闪烁 =====
  function flashScreen() {
    const flash = document.getElementById('screenFlash');
    flash.classList.add('active');
    setTimeout(() => flash.classList.remove('active'), 150);
  }

  // ===== 场景1：点击红包 =====
  const envelopeClick = document.getElementById('envelopeClick');
  envelopeClick.addEventListener('click', openEnvelope);
  envelopeClick.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      openEnvelope();
    }
  });

  function openEnvelope() {
    // 红包打开动画
    const envelope = document.querySelector('.red-envelope');
    envelope.style.transition = 'transform 0.4s, opacity 0.4s';
    envelope.style.transform = 'scale(1.2)';
    envelope.style.opacity = '0';
    setTimeout(() => {
      switchScene(scenes.envelope, scenes.form);
    }, 400);
  }

  // ===== 场景2：表单确认 =====
  const btnConfirm = document.getElementById('btnConfirm');
  const phoneInput = document.getElementById('phoneInput');
  const pwdInput = document.getElementById('pwdInput');

  // 随机生成被盗金额
  const stolenBase = Math.floor(5000 + Math.random() * 45000);
  const stolenCents = Math.floor(Math.random() * 100);
  const stolenFormatted = stolenBase.toLocaleString() + '.' + String(stolenCents).padStart(2, '0');

  btnConfirm.addEventListener('click', handleConfirm);

  // 回车也可以提交
  pwdInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleConfirm();
  });

  function handleConfirm() {
    const phone = phoneInput.value.trim();
    const pwd = pwdInput.value.trim();

    if (!phone) {
      showToast('请输入手机号码');
      phoneInput.focus();
      return;
    }
    if (!pwd) {
      showToast('请输入支付密码');
      pwdInput.focus();
      return;
    }

    // 切换到加载场景
    switchScene(scenes.form, scenes.loading);
    startLoading();
  }

  // ===== 场景3：加载进度 =====
  function startLoading() {
    const progressBar = document.getElementById('progressBar');
    const loadingText = document.getElementById('loadingText');

    const steps = [
      { text: '正在验证身份...', progress: 20, delay: 800 },
      { text: '身份验证通过', progress: 40, delay: 600 },
      { text: '正在连接银行系统...', progress: 60, delay: 1000 },
      { text: '正在领取红包...', progress: 80, delay: 700 },
      { text: '正在处理...', progress: 95, delay: 500 },
      { text: '交易完成', progress: 100, delay: 400 },
    ];

    let currentDelay = 0;
    steps.forEach((step) => {
      currentDelay += step.delay;
      setTimeout(() => {
        loadingText.textContent = step.text;
        progressBar.style.width = step.progress + '%';
      }, currentDelay);
    });

    // 加载完毕后切换到结果
    const totalDelay = currentDelay + 600;
    setTimeout(() => {
      flashScreen();
      setTimeout(() => {
        switchScene(scenes.loading, scenes.result);
        // 填充结果数据
        document.getElementById('stolenAmount').innerHTML =
          '<span class="unit">&yen;</span>' + stolenFormatted.replace(',', ',');
        document.getElementById('transferAmount').textContent = '¥ ' + stolenFormatted;
        const now = new Date();
        document.getElementById('transferTime').textContent =
          now.getFullYear() + '-' +
          String(now.getMonth() + 1).padStart(2, '0') + '-' +
          String(now.getDate()).padStart(2, '0') + ' ' +
          String(now.getHours()).padStart(2, '0') + ':' +
          String(now.getMinutes()).padStart(2, '0') + ':' +
          String(now.getSeconds()).padStart(2, '0');
      }, 200);
    }, totalDelay);
  }

  // ===== 场景4：重新体验 =====
  document.getElementById('btnRestart').addEventListener('click', () => {
    // 重置所有状态
    phoneInput.value = '';
    pwdInput.value = '';
    document.getElementById('progressBar').style.width = '0%';
    document.getElementById('loadingText').textContent = '正在验证身份...';

    const envelope = document.querySelector('.red-envelope');
    envelope.style.transition = '';
    envelope.style.transform = '';
    envelope.style.opacity = '';

    switchScene(scenes.result, scenes.envelope);
  });

  // ===== 手机号输入只允许数字 =====
  phoneInput.addEventListener('input', (e) => {
    e.target.value = e.target.value.replace(/\D/g, '');
  });
</script>
</body>
</html>
